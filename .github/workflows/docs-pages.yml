name: Docs Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install docs dependencies
        shell: bash
        run: bun install --cwd docs

      - name: Generate reference docs from Rust
        shell: bash
        run: cargo run --bin docs-sync -- sync

      - name: Build lazyskills demo binary
        shell: bash
        run: cargo build --release --bin lazyskills

      - name: Prepare reproducible VHS demo workspace
        shell: bash
        run: bash scripts/demo/setup-vhs-demo-dir.sh /tmp/lazyskills-vhs-demo

      - name: Add lazyskills binary to PATH for VHS
        shell: bash
        run: echo "${GITHUB_WORKSPACE}/target/release" >> "$GITHUB_PATH"

      - name: Render terminal demo GIF with VHS
        uses: charmbracelet/vhs-action@v2
        with:
          path: demos/lazyskills-find-skills.tape

      - name: Copy fresh demo GIF into docs public media
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/public/media
          cp demos/lazyskills-demo.gif docs/public/media/lazyskills-demo.gif

      - name: Write custom domain file
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/public
          printf 'lazyskills.xyz\n' > docs/public/CNAME

      - name: Build static docs for Pages
        shell: bash
        env:
          DOCS_GH_PAGES: "1"
          DOCS_BASE_PATH: ""
        run: |
          set -euo pipefail
          bun run --cwd docs build
          touch docs/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v4
